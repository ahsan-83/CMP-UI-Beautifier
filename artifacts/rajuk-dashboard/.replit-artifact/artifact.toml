kind = "web"
previewPath = "/"
title = "RAJUK Dashboard"
version = "1.0.0"
id = "artifacts/rajuk-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22785
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/rajuk-dashboard run dev"

[services.env]
PORT = "22785"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/rajuk-dashboard", "run", "build"]
publicDir = "artifacts/rajuk-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
